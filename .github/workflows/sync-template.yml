name: Sync Template to Multiple Repos

on:
push:
branches: [ main ]

jobs:
sync:
runs-on: ubuntu-latest

```
strategy:
  matrix:
    repo:
      - RenAhsAcme/SYSU-Network-Solution
      - RenAhsAcme/NCRE-III-Linux
      - RenAhsAcme/FP_Copilot_KeyboardTool
      - RenAhsAcme/ZenlessZoneZero_MusicVisualizer
      - RenAhsAcme/FP-Tools

steps:
  # 1. 拉取模板仓库
  - name: Checkout template repo
    uses: actions/checkout@v4

  # 2. 克隆目标仓库
  - name: Clone downstream repo
    run: |
      git clone https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/${{ matrix.repo }}.git downstream

  # 3. 配置 Git
  - name: Setup Git
    run: |
      git config --global user.name "template-bot"
      git config --global user.email "template-bot@users.noreply.github.com"

  # 4. 添加 upstream
  - name: Add upstream
    run: |
      cd downstream
      git remote add upstream https://github.com/Personal_Template_Base.git || true
      git fetch upstream

  # 5. subtree 同步
  - name: Pull subtree
    run: |
      cd downstream
      git subtree pull --prefix=.template upstream main --squash || true

  # 6. 同步文件（安全模式）
  - name: Sync template files
    run: |
      rsync -av \
        --exclude '.git' \
        --exclude '.template' \
        --exclude 'README.md' \
        downstream/.template/ downstream/

  # 7. 创建分支
  - name: Create branch
    run: |
      cd downstream
      git checkout -B template-sync

  # 8. 提交
  - name: Commit changes
    run: |
      cd downstream
      git add .
      git commit -m "chore: sync template" || echo "No changes"

  # 9. 推送
  - name: Push branch
    run: |
      cd downstream
      git push origin template-sync --force

  # 10. 创建 PR
  - name: Create PR
    uses: peter-evans/create-pull-request@v6
    with:
      token: ${{ secrets.SYNC_TOKEN }}
      path: downstream
      branch: template-sync
      base: main
      title: "chore: sync template updates"
      body: |
        Auto-sync from template repository.
```
